<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>リアルタイム高周波スペクトル</title>
  <!-- Outfit Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
  <!-- PeerJS WebRTC P2P Library -->
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
  <link rel="stylesheet" href="/src/style.css">
</head>
<body>
  <div class="app-container">
    <header class="app-header">
      <div class="logo">AuraSonic <span class="badge">HF Zoom</span></div>
      <p class="subtitle">高周波（10 kHz - 20 kHz）拡大スペクトル</p>
    </header>

    <!-- Connection Status Banner -->
    <div id="connection-status-banner" class="status-banner status-loading">
      <span id="status-icon">🔄</span> <span id="status-text">役割を判定中...</span>
    </div>

    <!-- Visualizer Canvas Card -->
    <section class="card visualizer-card">
      <div class="canvas-container">
        <canvas id="visualizer-canvas"></canvas>
      </div>
      <div class="frequency-labels">
        <span>10 kHz</span>
        <span>12.5 kHz</span>
        <span>15 kHz</span>
        <span>17.5 kHz</span>
        <span>20 kHz</span>
      </div>
      <div class="visualizer-footer">
        <span id="sampling-rate-info">マイクの動作周波数: -- Hz</span>
        <span class="warning-tip">※多くのスピーカーは15kHz以上を物理的に出力できません。またBluetoothマイクは高域が自動カットされます。</span>
      </div>
    </section>

    <!-- Main Control Button -->
    <div class="control-actions">
      <button id="btn-toggle-listen" class="btn-start">
        <span class="btn-icon">⚡</span> 測定開始 (マイク起動)
      </button>
    </div>
  </div>

  <!-- Main JavaScript Bundle -->
  <script type="module" src="/src/main.js"></script>
</body>
</html>
